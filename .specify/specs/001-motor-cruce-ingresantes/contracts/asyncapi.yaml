asyncapi: 3.1.0
info:
  title: Motor de Cruce Automático de Ingresantes UNMSM - Async Contracts
  version: 1.0.0
  description: |
    AsyncAPI contract for internal queue jobs and events processed via Redis and Laravel Queue.
    Traceability: US-001 (AC-004), NFR-001, NFR-006.
  license:
    name: Proprietary
    url: https://vonex.edu.pe/license
servers:
  redis:
    host: localhost:6379
    protocol: redis
    description: Redis server hosting Laravel queues
channels:
  queues/cruce:
    address: queues:cruce
    description: Laravel queue channel where Cruce CSV processing jobs are dispatched.
    messages:
      ProcessCsvBatchJob:
        $ref: '#/components/messages/ProcessCsvBatchJob'

  events/cruce/processed:
    address: events:cruce:processed
    description: Internal event dispatched when a CSV batch finishes processing successfully.
    messages:
      CruceBatchProcessedEvent:
        $ref: '#/components/messages/CruceBatchProcessedEvent'

  events/cruce/failed:
    address: events:cruce:failed
    description: Internal event dispatched when CSV batch processing fails.
    messages:
      CruceBatchFailedEvent:
        $ref: '#/components/messages/CruceBatchFailedEvent'

operations:
  enqueueCsvProcessing:
    action: send
    channel:
      $ref: '#/channels/queues~1cruce'
    summary: Dispatch CSV parsing job to Redis queue
    messages:
      - $ref: '#/channels/queues~1cruce/messages/ProcessCsvBatchJob'

  processCsvJob:
    action: receive
    channel:
      $ref: '#/channels/queues~1cruce'
    summary: Consume CSV processing jobs on Laravel worker
    messages:
      - $ref: '#/channels/queues~1cruce/messages/ProcessCsvBatchJob'

  publishBatchProcessed:
    action: send
    channel:
      $ref: '#/channels/events~1cruce~1processed'
    summary: Publish event when batch completes successfully
    messages:
      - $ref: '#/channels/events~1cruce~1processed/messages/CruceBatchProcessedEvent'

  publishBatchFailed:
    action: send
    channel:
      $ref: '#/channels/events~1cruce~1failed'
    summary: Publish event when batch fails unexpectedly
    messages:
      - $ref: '#/channels/events~1cruce~1failed/messages/CruceBatchFailedEvent'

components:
  messages:
    ProcessCsvBatchJob:
      name: ProcessCsvBatchJob
      title: CSV Processing Queue Job
      summary: Dispatched immediately after HTTP upload. Tells the worker to begin processing a CSV.
      correlationId:
        location: $message.payload#/correlation_id
      payload:
        type: object
        properties:
          lote_id:
            type: integer
            format: int64
            description: Unique identifier of the created LoteCruce.
            example: 101
          file_path:
            type: string
            description: Path to the uploaded CSV file stored in the local disk structure.
            example: 'cruce_uploads/unmsm_2026_06_24.csv'
          correlation_id:
            type: string
            format: uuid
            description: Unique ID to trace execution throughout the batch lifecycle.
            example: '4b9d8c52-3dc8-44a6-acd0-bcc353ba38ad'
        required:
          - lote_id
          - file_path
          - correlation_id

    CruceBatchProcessedEvent:
      name: CruceBatchProcessedEvent
      title: Cruce Batch Processed Event
      summary: Event published upon successful parsing, matching, and database persistence.
      correlationId:
        location: $message.payload#/correlation_id
      payload:
        type: object
        properties:
          lote_id:
            type: integer
            format: int64
            description: ID of the completed batch.
            example: 101
          total_registros:
            type: integer
            description: Total rows parsed.
            example: 27150
          total_ingresantes:
            type: integer
            description: Total rows persisted to ingresantes.
            example: 3200
          total_no_ingresantes:
            type: integer
            description: Total rows persisted to no_ingresantes.
            example: 23950
          correlation_id:
            type: string
            format: uuid
            description: Tracing correlation ID.
            example: '4b9d8c52-3dc8-44a6-acd0-bcc353ba38ad'
        required:
          - lote_id
          - total_registros
          - total_ingresantes
          - total_no_ingresantes
          - correlation_id

    CruceBatchFailedEvent:
      name: CruceBatchFailedEvent
      title: Cruce Batch Failed Event
      summary: Event published when processing fails (e.g., database connection timeout).
      correlationId:
        location: $message.payload#/correlation_id
      payload:
        type: object
        properties:
          lote_id:
            type: integer
            format: int64
            description: ID of the failed batch.
            example: 101
          error_message:
            type: string
            description: Diagnostic message outlining the root cause of failure.
            example: 'Fallo de conexión a la base de datos academia.'
          correlation_id:
            type: string
            format: uuid
            description: Tracing correlation ID.
            example: '4b9d8c52-3dc8-44a6-acd0-bcc353ba38ad'
        required:
          - lote_id
          - error_message
          - correlation_id
