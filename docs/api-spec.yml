openapi: 3.0.3
info:
  title: VX Intranet API Specs - Aula Fusión
  description: Documentación de la API para el módulo de Fusión de Aulas en la Intranet de VX.
  version: 1.0.0
servers:
  - url: /
paths:
  /alumno-matricula/aula-fusion:
    get:
      summary: Render index view
      description: Devuelve la vista de Blade principal para la gestión de fusión de aulas.
      tags:
        - AulaFusion
      responses:
        '200':
          description: HTML renderizado de la página.
  /alumno-matricula/aula-fusion/listado:
    get:
      summary: Obtener fusiones asociadas a una matrícula
      description: Retorna el listado de fusiones registradas filtradas por ID de matrícula.
      tags:
        - AulaFusion
      parameters:
        - name: matricula_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Listado de fusiones.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fusiones:
                    type: array
                    items:
                      type: object
  /alumno-matricula/aula-fusion/buscar-aula-referencia-autocomplete:
    post:
      summary: Buscar aulas de referencia por autocompletado multi-criterio
      description: Retorna aulas que coincidan parcialmente con un texto de búsqueda (código, nombre, etc.).
      tags:
        - AulaFusion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - search
              properties:
                search:
                  type: string
                anio:
                  type: integer
      responses:
        '200':
          description: Listado de aulas sugeridas.
  /alumno-matricula/aula-fusion/obtener-aula-completa:
    post:
      summary: Obtener datos completos de un aula
      description: Retorna un aula específica cargando sus campos secundarios y las frecuencias activas.
      tags:
        - AulaFusion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - aula_id
              properties:
                aula_id:
                  type: integer
      responses:
        '200':
          description: Datos del aula e información de frecuencias.
  /alumno-matricula/aula-fusion/crear-desde-referencia:
    post:
      summary: Crear aula de fusión desde referencia (creación rápida)
      description: Crea una nueva aula de fusión copiando campos secundarios de un aula base.
      tags:
        - AulaFusion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - aula_referencia_id
                - nombre
                - codigo_aula
                - aforo
                - hora_inicio_asistencia
                - frecuencia_asistencia
              properties:
                aula_referencia_id:
                  type: integer
                nombre:
                  type: string
                codigo_aula:
                  type: string
                aforo:
                  type: integer
                codigo_campus:
                  type: string
                  nullable: true
                codigo_google:
                  type: string
                  nullable: true
                enlace_whatsapp:
                  type: string
                  nullable: true
                link_drive:
                  type: string
                  nullable: true
                items_encuesta:
                  type: integer
                  nullable: true
                automatizacion_campus:
                  type: boolean
                hora_inicio_asistencia:
                  type: string
                  description: Hora formateada HH:mm:ss o HH:mm
                frecuencia_asistencia:
                  type: integer
                tutor_id:
                  type: integer
                  nullable: true
                auxiliar_id:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Aula creada exitosamente.
        '422':
          description: Error de validación (por ejemplo, si el código no termina en 'F').
  /alumno-matricula/aula-fusion/migrar-alumnos:
    post:
      summary: Migrar alumnos seleccionados a un aula destino
      description: Transfiere un listado de matrículas de alumnos desde múltiples aulas origen hacia un aula fusionada.
      tags:
        - AulaFusion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - aula_destino_id
                - aulas_origen
                - alumnos
              properties:
                aula_destino_id:
                  type: integer
                aulas_origen:
                  type: array
                  items:
                    type: integer
                alumnos:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Migración realizada con éxito.
        '422':
          description: Errores en la migración.
